<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2137"/>
      <stop offset="100%" style="stop-color:#0a1f1a"/>
    </linearGradient>
    <linearGradient id="wave192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
    <clipPath id="circle192">
      <circle cx="96" cy="96" r="96"/>
    </clipPath>
  </defs>

  <!-- 丸背景 -->
  <circle cx="96" cy="96" r="96" fill="url(#bg192)"/>

  <!-- RSSウェーブ（下部装飾） -->
  <g clip-path="url(#circle192)" opacity="0.35">
    <circle cx="46" cy="172" r="13" fill="url(#wave192)"/>
    <path d="M46 136 Q84 136 84 172" stroke="url(#wave192)" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M46 100 Q120 100 120 172" stroke="url(#wave192)" stroke-width="11" fill="none" stroke-linecap="round"/>
  </g>

  <!-- グリーンライン（アクセント） -->
  <rect x="32" y="108" width="128" height="3" rx="2" fill="url(#wave192)" opacity="0.8"/>

  <!-- RSS テキスト -->
  <text x="96" y="78" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="48" fill="#ffffff" text-anchor="middle" letter-spacing="1">RSS</text>

  <!-- ×AI テキスト -->
  <text x="96" y="104" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="28" fill="#ffffff" text-anchor="middle" letter-spacing="1">×AI</text>
</svg>