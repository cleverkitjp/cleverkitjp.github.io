<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2137"/>
      <stop offset="100%" style="stop-color:#0a1f1a"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>

  <!-- メインRSSウェーブ -->
  <circle cx="38" cy="152" r="16" fill="url(#wave)" filter="url(#glow)"/>
  <path d="M38 112 Q80 112 80 152" stroke="url(#wave)" stroke-width="14" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M38 72 Q120 72 120 152" stroke="url(#wave)" stroke-width="14" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M38 32 Q162 32 162 152" stroke="url(#wave)" stroke-width="14" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- AIバッジ -->
  <rect x="112" y="18" width="62" height="30" rx="9" fill="#10b981" opacity="0.18"/>
  <rect x="114" y="20" width="58" height="26" rx="8" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0.6"/>
  <text x="143" y="39" font-family="Arial,sans-serif" font-weight="bold" font-size="18" fill="#6ee7b7" text-anchor="middle">AI</text>
</svg>