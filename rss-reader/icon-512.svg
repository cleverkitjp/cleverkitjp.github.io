<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2137"/>
      <stop offset="100%" style="stop-color:#0a1f1a"/>
    </linearGradient>
    <linearGradient id="wave512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
    <clipPath id="circle512">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- 丸背景 -->
  <circle cx="256" cy="256" r="256" fill="url(#bg512)"/>

  <!-- RSSウェーブ（下部装飾） -->
  <g clip-path="url(#circle512)" opacity="0.35">
    <circle cx="122" cy="458" r="34" fill="url(#wave512)"/>
    <path d="M122 362 Q226 362 226 458" stroke="url(#wave512)" stroke-width="30" fill="none" stroke-linecap="round"/>
    <path d="M122 266 Q320 266 320 458" stroke="url(#wave512)" stroke-width="30" fill="none" stroke-linecap="round"/>
  </g>

  <!-- グリーンライン（アクセント） -->
  <rect x="86" y="288" width="340" height="8" rx="4" fill="url(#wave512)" opacity="0.8"/>

  <!-- RSS テキスト -->
  <text x="256" y="208" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="128" fill="#ffffff" text-anchor="middle" letter-spacing="2">RSS</text>

  <!-- ×AI テキスト -->
  <text x="256" y="278" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="74" fill="#ffffff" text-anchor="middle" letter-spacing="2">×AI</text>
</svg>